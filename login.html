<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <script type="module" src="auth.js"></script>
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Talent Flow</title>
</head>
<body>
    <div class="welcome-container">
        <div class="image"><img src="4420721.jpg" alt="Welcome Image" class="welcome-image"></div>
        <div class="welcome">
            <div class="welcome-text">
                <h1>Welcome Back!</h1>
                <form>
                        <label for="Email" class="email"> Your Email</label><br>
                        <input type="email" id="Email" name="Email" placeholder="Username @gmail.com"><br><br>
                        <label for="password" class="email">Password</label><br>
                        <div class="password-wrap">
                            <input type="password" id="password" name="password" placeholder="Enter your 8-character password">
                            <button type="button" class="toggle-password" data-target="password" aria-label="Show password">
                                <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12Z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12Z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                    <line x1="3" y1="3" x2="21" y2="21"/>
                                </svg>
                            </button>
                        </div>
                    </form>
                    <div>
                        <h2 class="forgot"><a href="password.html">Forgot Password?</a></h2>
                    </div>
                    <button type="button" class="log" id="loginBtn">Login</button>
                    <div class="dd"><span>Instant Login</span></div>
                    <div class="logs">
                      <button type="button" class="google-placeholder-btn" id="googleSignInBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#EA4335" d="M5.27 9.77A7 7 0 0 1 12 5c1.69 0 3.22.6 4.41 1.59L19.9 3.1A11.94 11.94 0 0 0 12 0C7.43 0 3.46 2.7 1.42 6.65l3.85 3.12z"/><path fill="#FBBC05" d="M16.04 18.01A7 7 0 0 1 12 19c-3.35 0-6.2-2.35-7.04-5.5L1.1 16.47C3.14 20.58 7.25 23.5 12 23.5a11.93 11.93 0 0 0 8.27-3.28l-4.23-2.21z"/><path fill="#4285F4" d="M23.5 12c0-.88-.08-1.73-.24-2.55H12v5.09h6.46a5.56 5.56 0 0 1-2.42 3.63l4.23 2.21C22.43 18.35 23.5 15.34 23.5 12z"/><path fill="#34A853" d="M4.96 13.5A7.07 7.07 0 0 1 4.64 12c0-.52.07-1.02.19-1.5L1.1 7.53A11.94 11.94 0 0 0 .5 12c0 1.93.46 3.76 1.28 5.38l3.18-3.88z"/></svg>
                        Continue with Google
                      </button>
                    </div>
                    <p>Don't have an account? <span><a href="register.html">Register</a></span></p>


            </div>
        </div>
    </div>
</body>
</html>

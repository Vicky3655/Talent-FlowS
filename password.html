<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="password.css">
    <script type="module" src="auth.js"></script>
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Talent Flow</title>
</head>
<body>
    <div class="welcome-container">
        <div class="image"><img src="4420721.jpg" alt="Welcome Image" class="welcome-image"></div>
        <div class="welcome">
            <div class="welcome-text">
                <h1>Forgot Password?</h1>
                <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>

                <form>
                        <label for="Email" class="email"> Your Email</label><br>
                        <input type="email" id="Email" name="Email" placeholder="Username @gmail.com"><br><br>
                    </form>
                    <button type="button" class="log" id="sendResetBtn">Send Reset Link</button>

                    <div class="reset-result" id="resetResult" hidden>
                        <div class="reset-result-head">
                            <span class="reset-result-icon">&check;</span>
                            <span>Check your inbox</span>
                        </div>
                        <p class="reset-hint">We've sent a password reset link to <strong id="resetSentEmail"></strong>. Open it to choose a new password — didn't get it? Check spam, or generate another one here.</p>
                        <a href="login.html" class="btn-go-login">Continue to Login →</a>
                    </div>

                    <div class="reset-error" id="resetError" hidden></div>

                    <p>Remember your password? <span><a href="login.html">Login</a></span></p>
            </div>
        </div>
    </div>
</body>
</html>
